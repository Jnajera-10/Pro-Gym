{% extends 'layouts/base.html' %}
{% block title %}Nuevo Cliente{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="fas fa-user-plus me-2"></i>Registrar Cliente</h4>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre Completo *</label>
                    <input type="text" name="full_name" class="form-control" required value="{{ data.full_name if data else '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tipo Documento *</label>
                    <select name="document_type" class="form-select" required>
                        <option value="CC">Cédula</option>
                        <option value="TI">Tarjeta Identidad</option>
                        <option value="CE">Cédula Extranjería</option>
                        <option value="PAS">Pasaporte</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Número Documento *</label>
                    <input type="text" name="document_number" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Celular</label>
                    <input type="tel" name="phone" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Fecha Nacimiento</label>
                    <input type="date" name="birth_date" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contacto Emergencia</label>
                    <input type="text" name="emergency_contact" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Teléfono Emergencia</label>
                    <input type="tel" name="emergency_phone" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Observaciones</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Guardar Cliente</button>
                    <a href="{{ url_for('clients.index') }}" class="btn btn-secondary">Cancelar</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
